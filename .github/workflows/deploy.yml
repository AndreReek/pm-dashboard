name: Deploy to Vercel

on:
  push:
    branches:
      - main

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false   # never cancel an in-flight production deploy

jobs:
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install Vercel CLI
      # -----------------------------------------------------------------------
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # -----------------------------------------------------------------------
      # 3. Pull Vercel environment & project metadata
      #    This writes .vercel/project.json locally so subsequent commands
      #    know which project / org to target.
      # -----------------------------------------------------------------------
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # -----------------------------------------------------------------------
      # 4. Deploy to production
      #    --prod promotes the deployment to the production URL immediately.
      #    No build step is needed — the project is plain HTML/CSS/JS.
      # -----------------------------------------------------------------------
      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # -----------------------------------------------------------------------
      # 5. Print deployment URL in the Actions summary
      # -----------------------------------------------------------------------
      - name: Print deployment URL
        run: |
          echo "### Deployed to production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
