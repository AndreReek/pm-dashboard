<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Dashboard — Reset Password</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <h1>📊 PM Dashboard</h1>
            <p class="subtitle">Set your new password</p>

            <div id="errorBox" class="login-error"></div>
            <div id="successBox" class="login-error" style="display:none; background:var(--green-bg); color:var(--green-text);"></div>

            <form id="resetForm" class="login-form" onsubmit="handleReset(event)">
                <div>
                    <label class="form-label">New Password</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div>
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your new password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">Set New Password</button>
            </form>

            <div id="noTokenState" style="display:none; text-align:center; padding:16px 0;">
                <p style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">This link is invalid or has expired.</p>
                <a href="login.html" class="btn btn-secondary" style="display:inline-block;">Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ikgybeldlngntrpyzcnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RodF4T3p7nW1AVdkAmm3Lg_78pL2uPv';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorBox').style.display = 'none';
        }

        // Supabase password-recovery tokens arrive as URL hash fragments.
        // The client library exchanges them automatically on createClient — we
        // just need to detect the recovery session before showing the form.
        (async () => {
            const { data: { session } } = await db.auth.getSession();

            // If there's no session at all and no hash, the link is stale/invalid.
            if (!session && !window.location.hash.includes('type=recovery')) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('noTokenState').style.display = 'block';
            }
        })();

        async function handleReset(e) {
            e.preventDefault();
            hideError();

            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            if (newPwd !== confirmPwd) {
                showError('Passwords do not match.');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.textContent = 'Updating…';
            btn.disabled = true;

            try {
                const { error } = await db.auth.updateUser({ password: newPwd });
                if (error) throw error;

                document.getElementById('resetForm').style.display = 'none';
                const success = document.getElementById('successBox');
                success.textContent = 'Password updated. Redirecting to dashboard…';
                success.style.display = 'block';

                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            } catch (err) {
                showError(err.message || 'Could not update password. Try requesting a new reset link.');
                btn.textContent = 'Set New Password';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
