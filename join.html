<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Dashboard — Join Organization</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <h1>📊 PM Dashboard</h1>
            <p class="subtitle" id="subtitle">Checking your invite…</p>

            <div id="errorBox" class="login-error"></div>

            <!-- Loading state -->
            <div id="loadingState" style="text-align:center; padding:24px 0; color:var(--text-secondary); font-size:14px;">
                Verifying invite link…
            </div>

            <!-- Invite details + join form -->
            <div id="joinState" style="display:none;">
                <div style="padding:16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:20px; text-align:center;">
                    <div style="font-size:24px; margin-bottom:8px;">🏢</div>
                    <div style="font-size:15px; font-weight:700;" id="orgNameDisplay"></div>
                    <div style="font-size:13px; color:var(--text-secondary); margin-top:4px;" id="roleDisplay"></div>
                </div>

                <!-- Tabs: sign in existing / create new -->
                <div class="login-tabs">
                    <button class="login-tab active" onclick="switchJoinTab('signin')">I have an account</button>
                    <button class="login-tab" onclick="switchJoinTab('register')">Create account</button>
                </div>

                <!-- Sign in form -->
                <form id="signinForm" class="login-form" onsubmit="handleJoinSignin(event)">
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" id="siEmail" class="form-input" placeholder="you@company.com" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" id="siPassword" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="siBtn">Sign In & Join</button>
                </form>

                <!-- Register form -->
                <form id="registerForm" class="login-form" style="display:none;" onsubmit="handleJoinRegister(event)">
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" id="regEmail" class="form-input" placeholder="you@company.com" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" id="regBtn">Create Account & Join</button>
                </form>
            </div>

            <!-- Invalid token state -->
            <div id="invalidState" style="display:none; text-align:center; padding:16px 0;">
                <p style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">
                    This invite link is invalid or has already been used.
                </p>
                <a href="login.html" class="btn btn-secondary" style="display:inline-block;">Go to Sign In</a>
            </div>

            <!-- Already a member state -->
            <div id="alreadyMemberState" style="display:none; text-align:center; padding:16px 0;">
                <p style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">
                    You are already a member of this organization.
                </p>
                <a href="dashboard.html" class="btn btn-primary" style="display:inline-block;">Go to Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ikgybeldlngntrpyzcnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RodF4T3p7nW1AVdkAmm3Lg_78pL2uPv';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inviteData = null; // { id, org_id, email, role, token }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }

        function setLoading(btnId, loading, defaultLabel) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait…' : defaultLabel;
        }

        function switchJoinTab(tab) {
            document.getElementById('signinForm').style.display = tab === 'signin' ? 'flex' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
            document.querySelectorAll('.login-tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'signin' && i === 0) || (tab === 'register' && i === 1));
            });
            hideError();
        }

        // --- Validate token on load ---
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showInvalid();
                return;
            }

            // Look up invitation by token
            const { data: invite, error } = await db
                .from('invitations')
                .select('id, org_id, email, role, accepted_at')
                .eq('token', token)
                .single();

            if (error || !invite) { showInvalid(); return; }
            if (invite.accepted_at) { showInvalid(); return; }

            // Fetch org name
            const { data: org } = await db
                .from('organizations')
                .select('name')
                .eq('id', invite.org_id)
                .single();

            inviteData = { ...invite, token, orgName: org?.name || 'an organization' };

            // Check if already signed in
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                // Check if already a member
                const { data: existing } = await db
                    .from('org_members')
                    .select('id')
                    .eq('org_id', invite.org_id)
                    .eq('user_id', session.user.id)
                    .single();

                if (existing) {
                    showState('alreadyMemberState');
                    return;
                }
                // Auto-join
                await joinOrg(session.user.id);
                return;
            }

            // Show join form
            document.getElementById('orgNameDisplay').textContent = inviteData.orgName;
            document.getElementById('roleDisplay').textContent = `You will join as: ${invite.role}`;
            document.getElementById('subtitle').textContent = `You've been invited to join ${inviteData.orgName}`;
            if (invite.email) document.getElementById('siEmail').value = invite.email;
            showState('joinState');
        })();

        function showState(id) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById(id).style.display = '';
        }

        function showInvalid() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('invalidState').style.display = '';
            document.getElementById('subtitle').textContent = 'Invalid invite link';
        }

        async function joinOrg(userId) {
            const { error: memberErr } = await db.from('org_members').insert([{
                org_id: inviteData.org_id,
                user_id: userId,
                role: inviteData.role
            }]);
            if (memberErr) { showError('Failed to join organization: ' + memberErr.message); return; }

            // Mark invite as accepted
            await db.from('invitations').update({ accepted_at: new Date().toISOString() }).eq('id', inviteData.id);

            window.location.href = 'dashboard.html';
        }

        async function handleJoinSignin(e) {
            e.preventDefault();
            hideError();
            setLoading('siBtn', true, 'Sign In & Join');

            const email = document.getElementById('siEmail').value;
            const password = document.getElementById('siPassword').value;

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await joinOrg(data.user.id);
            } catch (err) {
                showError(err.message || 'Sign in failed.');
                setLoading('siBtn', false, 'Sign In & Join');
            }
        }

        async function handleJoinRegister(e) {
            e.preventDefault();
            hideError();
            setLoading('regBtn', true, 'Create Account & Join');

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const { data, error } = await db.auth.signUp({ email, password });
                if (error) throw error;
                if (!data.session) {
                    showError('Check your email to confirm your account, then use the invite link again.');
                    setLoading('regBtn', false, 'Create Account & Join');
                    return;
                }
                await joinOrg(data.user.id);
            } catch (err) {
                showError(err.message || 'Registration failed.');
                setLoading('regBtn', false, 'Create Account & Join');
            }
        }
    </script>
</body>

</html>
