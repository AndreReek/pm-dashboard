<body>
    <div class="login-page">
        <div class="login-card">
            <h1><span class="brand-mark" aria-hidden="true"><svg viewBox="120 110 300 300" xmlns="http://www.w3.org/2000/svg" width="30" height="30"><path d="M311.740967,383.338989 C306.303558,377.827148 302.522125,371.605255 299.132233,364.342255 C296.457458,367.821045 295.805847,371.465546 294.295410,374.671021 C290.305725,383.138000 286.223846,391.493317 278.479065,397.366272 C271.253876,402.845154 263.037384,402.700195 256.121796,396.783264 C247.183640,389.135803 242.484497,378.795929 238.516922,368.163391 C231.386581,349.055023 227.681854,329.160889 225.577057,308.907684 C223.717926,291.018311 222.244095,273.104889 222.938980,255.126358 C224.200256,222.494049 227.016769,190.059158 238.392807,159.045731 C241.962921,149.312820 246.355240,139.983246 253.691376,132.388107 C262.314301,123.460754 272.431824,123.501930 281.257202,132.170502 C288.476227,139.261261 292.588501,148.112885 296.302856,157.251602 C297.039551,159.064133 297.760345,160.883102 298.705292,163.239883 C301.947113,158.150864 304.572815,153.365326 307.823975,149.051147 C317.173340,136.644958 328.801483,136.619568 338.318481,148.963577 C348.451691,162.106857 352.728546,177.704300 356.254211,193.524384 C362.591797,221.961731 364.409485,250.843491 363.130402,279.836151 C361.948425,306.627808 358.655212,333.201447 349.366943,358.638489 C346.670410,366.023224 343.069916,372.983887 338.297607,379.252075 C330.795349,389.105804 321.319916,390.612274 311.740967,383.338989 M293.291840,180.043777 C294.041962,175.930466 297.705444,172.037643 293.069000,167.693329 C286.334564,161.383209 278.582489,161.809143 272.493164,169.610031 C268.054962,175.295731 264.827209,181.708878 262.542480,188.535675 C256.650848,206.139832 253.340271,224.331711 252.500320,242.785324 C251.403732,266.876801 251.434906,291.021942 256.384583,314.829559 C259.335358,329.022552 262.550507,343.140015 271.037354,355.349304 C273.262146,358.549957 275.805206,361.401093 279.474823,362.899750 C284.141327,364.805450 288.332550,363.563568 291.92666             <p class="subtitle" id="subtitle">Checking your invite…</p>

            <div id="errorBox" class="login-error"></div>

            <!-- Loading state -->
            <div id="loadingState" style="text-align:center; padding:24px 0; color:var(--text-secondary); font-size:14px;">
                Checking your invite…
            </div>

            <!-- Invite details + join form -->
            <div id="joinState" style="display:none;">
                <div style="padding:16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:20px; text-align:center;">
                    <div style="font-size:24px; margin-bottom:8px;">🏢</div>
                    <div style="font-size:15px; font-weight:700;" id="orgNameDisplay"></div>
                    <div style="font-size:13px; color:var(--text-secondary); margin-top:4px;" id="roleDisplay"></div>
                </div>

                <!-- Tabs: sign in existing / create new -->
                <div class="login-tabs">
                    <button class="login-tab active" onclick="switchJoinTab('signin')">Sign in to join</button>
                    <button class="login-tab" onclick="switchJoinTab('register')">Create account & join</button>
                </div>

                <!-- Sign in form -->
                <form id="signinForm" class="login-form" onsubmit="handleJoinSignin(event)">
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" id="siEmail" class="form-input" placeholder="you@company.com" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" id="siPassword" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="siBtn">Sign in and join</button>
                </form>

                <!-- Register form -->
                <form id="registerForm" class="login-form" style="display:none;" onsubmit="handleJoinRegister(event)">
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" id="regEmail" class="form-input" placeholder="you@company.com" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" id="regBtn">Create account and join</button>
                </form>
            </div>

            <!-- Invalid token state -->
            <div id="invalidState" style="display:none; text-align:center; padding:16px 0;">
                <p style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">
                    This invite link is no longer valid. It may have already been used or expired.
                </p>
                <a href="login.html" class="btn btn-secondary" style="display:inline-block;">Back to sign in</a>
            </div>

            <!-- Already a member state -->
            <div id="alreadyMemberState" style="display:none; text-align:center; padding:16px 0;">
                <p style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">
                    You're already part of this organization.
                </p>
                <a href="dashboard.html" class="btn btn-primary" style="display:inline-block;">Open your dashboard</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ikgybeldlngntrpyzcnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RodF4T3p7nW1AVdkAmm3Lg_78pL2uPv';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inviteData = null; // { id, org_id, email, role, token }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }

        function setLoading(btnId, loading, defaultLabel) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait…' : defaultLabel;
        }

        function switchJoinTab(tab) {
            document.getElementById('signinForm').style.display = tab === 'signin' ? 'flex' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
            document.querySelectorAll('.login-tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'signin' && i === 0) || (tab === 'register' && i === 1));
            });
            hideError();
        }

        // --- Validate token on load ---
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showInvalid();
                return;
            }

            // Look up invitation by token
            const { data: invite, error } = await db
                .from('invitations')
                .select('id, org_id, email, role, accepted_at')
                .eq('token', token)
                .single();

            if (error || !invite) { showInvalid(); return; }
            if (invite.accepted_at) { showInvalid(); return; }

            // Fetch org name
            const { data: org } = await db
                .from('organizations')
                .select('name')
                .eq('id', invite.org_id)
                .single();

            inviteData = { ...invite, token, orgName: org?.name || 'an organization' };

            // Check if already signed in
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                // Check if already a member
                const { data: existing } = await db
                    .from('org_members')
                    .select('id')
                    .eq('org_id', invite.org_id)
                    .eq('user_id', session.user.id)
                    .single();

                if (existing) {
                    showState('alreadyMemberState');
                    return;
                }
                // Auto-join
                await joinOrg(session.user.id);
                return;
            }

            // Show join form
            document.getElementById('orgNameDisplay').textContent = inviteData.orgName;
            document.getElementById('roleDisplay').textContent = `Joining as: ${invite.role}`;
            document.getElementById('subtitle').textContent = `You've been invited to join ${inviteData.orgName}`;
            if (invite.email) document.getElementById('siEmail').value = invite.email;
            showState('joinState');
        })();

        function showState(id) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById(id).style.display = '';
        }

        function showInvalid() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('invalidState').style.display = '';
            document.getElementById('subtitle').textContent = 'Invalid invite link';
        }

        async function joinOrg(userId) {
            const { error: memberErr } = await db.from('org_members').insert([{
                org_id: inviteData.org_id,
                user_id: userId,
                role: inviteData.role
            }]);
            if (memberErr) { showError('Failed to join organization: ' + memberErr.message); return; }

            // Mark invite as accepted
            await db.from('invitations').update({ accepted_at: new Date().toISOString() }).eq('id', inviteData.id);

            window.location.href = 'dashboard.html';
        }

        async function handleJoinSignin(e) {
            e.preventDefault();
            hideError();
            setLoading('siBtn', true, 'Sign in and join');

            const email = document.getElementById('siEmail').value;
            const password = document.getElementById('siPassword').value;

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await joinOrg(data.user.id);
            } catch (err) {
                showError(err.message || 'Sign in failed.');
                setLoading('siBtn', false, 'Sign in and join');
            }
        }

        async function handleJoinRegister(e) {
            e.preventDefault();
            hideError();
            setLoading('regBtn', true, 'Create account and join');

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const { data, error } = await db.auth.signUp({ email, password });
                if (error) throw error;
                if (!data.session) {
                    showError('Check your email to confirm your account, then use the invite link again.');
                    setLoading('regBtn', false, 'Create account and join');
                    return;
                }
                await joinOrg(data.user.id);
            } catch (err) {
                showError(err.message || 'Registration failed.');
                setLoading('regBtn', false, 'Create account and join');
            }
        }
    </script>
</body>
